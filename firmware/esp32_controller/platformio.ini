; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
packages_dir = ./.pio/packages

[env]
platform = platformio/espressif32 @ 6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200

platform_packages = 
    framework-arduinoespressif32@https://github.com/ricardoquesada/esp32-arduino-lib-builder/releases/download/4.1.0/esp32-bluepad32-4.1.0.zip

lib_deps = 
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.2

[env:teleop]
build_src_filter = +<*> -<main_calibration.cpp>

[env:calibration]
build_src_filter = +<*> -<main.cpp>